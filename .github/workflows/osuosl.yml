name: osuosl

on:
#  push:
#  pull_request:

# Install dependencies
# Autogen.sh
# Configure
# Make
# Install
# Clear the kernel ring buffer
# Reclaim and report disk space
# Prepare artifacts
# Complete job

jobs:
  testings-linux:
    name: Debian/Ubuntu testings
    strategy:
      fail-fast: false
      matrix:
        runners: [ arm64-debian-10, arm64-debian-11, arm64-ubuntu-22, ppc64-debian-sid, ppc64le-debian-11, ppc64le-ubuntu-22 ]
    runs-on: ${{ matrix.runners }}
    steps:
    - name: Install dependencies
      timeout-minutes: 2
      shell: bash
      run: |
        echo "uname -a"
        uname -a
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update -y --fix-missing
        sudo apt-get upgrade -y
        sudo apt-get install -y acl alien attr autoconf bc build-essential curl dbench debhelper-compat dh-python dkms fakeroot fio gdb gdebi git ksh lcov libacl1-dev libaio-dev libattr1-dev libblkid-dev libcurl4-openssl-dev libdevmapper-dev libelf-dev libffi-dev libmount-dev libpam0g-dev libselinux1-dev libssl-dev libtool libudev-dev linux-headers-generic lsscsi mdadm nfs-kernel-server pamtester parted po-debconf python3 python3-all-dev python3-cffi python3-dev python3-packaging python3-pip python3-setuptools python3-sphinx rng-tools-debian rsync samba sysstat uuid-dev watchdog wget xfslibs-dev xz-utils zlib1g-dev
        sudo apt-get clean
    - name: Cleanup
      if: always()
      timeout-minutes: 1
      run: |
        ${{ secrets.REBUILD_REQUEST }} runner=$HOSTNAME

  testings-almalinux:
    name: AlmaLinux 8/9 testings
    strategy:
      fail-fast: false
      matrix:
        runners: [ arm64-fedora-36, ppc64le-almalinux-8, ppc64le-almalinux-9 ]
    runs-on: ${{ matrix.runners }}
    steps:
    - name: Install dependencies
      timeout-minutes: 15
      shell: bash
      run: |
        echo "uname -a"
        uname -a
        sudo dnf update -y
        sudo dnf install -y --skip-broken epel-release gcc make autoconf automake libtool rpm-build libtirpc-devel libblkid-devel libuuid-devel libudev-devel openssl-devel zlib-devel libaio-devel libattr-devel elfutils-libelf-devel kernel-devel-$(uname -r) python3 python3-devel python3-setuptools python3-cffi libffi-devel git ncompress libcurl-devel
        sudo dnf install -y --skip-broken --enablerepo=epel --enablerepo=powertools python3-packaging dkms
    - name: Cleanup
      if: always()
      timeout-minutes: 1
      run: |
        ${{ secrets.REBUILD_REQUEST }} runner=$HOSTNAME

  testings-freebsd:
    name: FreeBSD 13 testing
    strategy:
      fail-fast: false
      matrix:
        runners: [ arm64-freebsd-13 ]
    runs-on: ${{ matrix.runners }}
    steps:
    - name: Install dependencies
      timeout-minutes: 15
      shell: bash
      run: |
        echo "uname -a"
        uname -a
        yes | sudo pkg install autoconf automake autotools git gmake python devel/py-sysctl sudo
    - name: Cleanup
      if: always()
      timeout-minutes: 1
      run: |
        ${{ secrets.REBUILD_REQUEST }} runner=$HOSTNAME
